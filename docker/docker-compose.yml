version: '3.8'

services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - MODEL_PATH=/app/models/best_model.pkl
      - DATABASE_URL=postgresql://user:pass@db:5432/churn_db
      - PYTHONUNBUFFERED=1
    depends_on:
      - db
    volumes:
      - ../models:/app/models:ro
      - ../data:/app/data:ro
    restart: unless-stopped
  
  db:
    image: postgres:13
    environment:
      - POSTGRES_DB=churn_db
      - POSTGRES_USER=viettel_user
      - POSTGRES_PASSWORD=secure_password_123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
  
  monitoring:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin123
    depends_on:
      - db
    restart: unless-stopped
  
  airflow-webserver:
    image: apache/airflow:2.7.0
    command: webserver
    ports:
      - "8080:8080"
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__SQL_ALCHEMY_CONN=postgresql+psycopg2://viettel_user:secure_password_123@db:5432/churn_db
    depends_on:
      - db
    restart: unless-stopped
  
  redis:
    image: redis:latest
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  postgres_data: